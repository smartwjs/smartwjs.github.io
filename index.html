<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>smartwjs 的博客</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html">首页</a>
    <a href="#about">关于我</a>
  </nav>

  <div class="blog-list">
    <h1>smartwjs 的博客</h1>
    <!-- 自动生成的博客列表会插入到这里 -->
    <div id="auto-blog-list"></div>
    <!-- 加载提示 -->
    <div id="loading" style="text-align: center; color: #777; padding: 20px;">
      正在加载博客列表...
    </div>
    <!-- 加载失败提示 -->
    <div id="error" style="text-align: center; color: #e74c3c; padding: 20px; display: none;">
      博客列表加载失败，请稍后重试
    </div>
  </div>

  <footer>
    © 2026 smartwjs 的博客 | 托管在 GitHub Pages
  </footer>

  <script>
    // 已适配你的 GitHub 信息，无需修改
    const CONFIG = {
      username: "smartwjs", 
      repo: "smartwjs.github.io", 
      branch: "main", 
      folder: "blogs" 
    };

    // 解析文件名：从 "2026-03-13-标题.md" 提取日期和标题
    function parseFileName(fileName) {
      // 去掉 .md 后缀
      const nameWithoutExt = fileName.replace(/\.md$/, "");
      // 匹配 YYYY-MM-DD-标题 格式
      const regex = /^(\d{4}-\d{2}-\d{2})-(.*)$/;
      const match = nameWithoutExt.match(regex);
      if (match) {
        return {
          date: match[1],
          title: match[2].replace(/-/g, " ") // 把连字符换成空格，更美观
        };
      }
      // 非标准命名的 fallback
      return {
        date: "未知日期",
        title: nameWithoutExt
      };
    }

    // 自动加载 blogs 文件夹的所有 MD 文件并生成列表
    async function loadBlogList() {
      const listContainer = document.getElementById("auto-blog-list");
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");

      try {
        // 调用 GitHub API 获取 blogs 文件夹的文件列表
        const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.folder}?ref=${CONFIG.branch}`;
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
          throw new Error(`API 请求失败：${response.status}`);
        }

        const files = await response.json();
        // 过滤出 .md 文件，并按日期倒序排序（最新的在前）
        const mdFiles = files
          .filter(file => file.name.endsWith(".md"))
          .sort((a, b) => {
            const aDate = parseFileName(a.name).date;
            const bDate = parseFileName(b.name).date;
            return bDate.localeCompare(aDate);
          });

        // 清空加载提示，生成博客列表
        loading.style.display = "none";
        if (mdFiles.length === 0) {
          listContainer.innerHTML = "<p style='color: #777;'>暂无博客文章，快来发布第一篇吧！</p>";
          return;
        }

        // 遍历 MD 文件，生成列表项
        let listHtml = "";
        mdFiles.forEach(file => {
          const { date, title } = parseFileName(file.name);
          const fileUrl = `view.html?file=${encodeURIComponent(file.name)}`; // 转义特殊字符
          listHtml += `
            <div class="blog-item">
              <a href="${fileUrl}">${title}</a>
              <div class="meta">发布时间：${date} | 文件名：${file.name}</div>
            </div>
          `;
        });
        listContainer.innerHTML = listHtml;

      } catch (err) {
        // 加载失败处理
        loading.style.display = "none";
        error.style.display = "block";
        console.error("加载博客列表失败：", err);
      }
    }

    // 页面加载时执行
    window.onload = loadBlogList;
  </script>
</body>
</html>
